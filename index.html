<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Speeches App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🧠 Speeches Manager</h1>

  <div class="layout">

    <!-- IZQUIERDA -->
    <div class="sidebar">

      <!-- AREAS -->
      <div class="card">
        <h3>📂 Áreas</h3>
        <input id="areaInput" placeholder="Nueva área">
        <button onclick="crearArea()">Crear</button>

        <select id="areaSelect"></select>
      </div>

      <!-- GRUPOS -->
      <div class="card">
        <h3>🏷️ Grupos</h3>
        <input id="groupInput" placeholder="Nuevo grupo">
        <button id="btnGrupo" onclick="crearGrupo()" disabled>Crear</button>

        <div id="groupsContainer" class="chips"></div>
      </div>

    </div>

    <!-- DERECHA -->
    <div class="main">

      <!-- CREAR SPEECH -->
      <div class="card">
        <h3>📝 Crear Speech</h3>
        <input id="speechTitle" placeholder="Título">
        <input id="speechDetail" placeholder="Detalle">
        <textarea id="speechContent" placeholder="Contenido"></textarea>
        <button id="btnSpeech" onclick="crearSpeech()" disabled>Crear</button>
      </div>
      
      <input id="searchInput" placeholder="Buscar speeches por título...">

      <!-- LISTA -->
      <div class="card">
        <h3>📋 Speeches</h3>
        <div id="speechesContainer"></div>
      </div>

    </div>

  </div>


  <div id="speechModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn">✖</button>

      <h3 id="modalTitle"></h3>
      <small id="modalDetail"></small>
      <p id="modalContent"></p>
    </div>
  </div>


  <script type="module" src="app.js"></script>
</body>
</html>
